      /health:
        get:
          summary: Retrieve health status

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  namespace: default
  name: admin-reporting-api
  title: Admin Reporting API
  description: API for generating reports and analytics for admin users
  tags:
    - reporting
    - analytics
    - graphql
spec:
  type: graphql
  lifecycle: production
  owner: platform-team
  system: admin-tools
  definition: |
    type Query {
      """Get user activity report for a specific time range"""
      userMetrics(startDate: String!, endDate: String!): UserMetrics

      """Get system performance data"""
      systemHealth: SystemHealth

      """Search customers with flexible filters"""
      searchCustomers(filters: CustomerFilters!): [Customer]
    }

    type UserMetrics {
      totalLogins: Int!
      activeUsers: Int!
      newRegistrations: Int!
    }

    type SystemHealth {
      uptime: Float!
      responseTime: Float!
      errorRate: Float!
    }

    type Customer {
      id: ID!
      name: String!
      email: String!
      lastLogin: String
    }

    input CustomerFilters {
      name: String
      registrationDate: String
      status: String
    }
