apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  namespace: default
  name: customer-data-api
  title: Customer Data API
  description: API for managing customer data and interactions
  tags:
    - customer-data
    - rest
    - crud
spec:
  type: openapi
  lifecycle: production
  owner: frontend-team
  system: customer-experience
  definition: |
    openapi: 3.0.0
    info:
      title: Customer Data API
      version: 2.1.0
      description: Provides endpoints for managing customer data and interactions
    paths:
      /customers/{id}:
        get:
          summary: retrieve customer profile by ID
        put:
          summary: Update customer profile information
        delete:
          summary: Delete a customer
      /customers/{id}/preferences:
        get:
          summary: Get customer details
        post:
          summary: Update customer preferences
      /customers/{id}/orders:
        get:
          summary: Get customer orders

