apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-service-template
  title: Node.js Service Template
  description: |
   A template for creating a new Node.js service
   ## what does this template do?
   - **Express.js API** with typescript for type safety and better developer experience
   - **Testing setup** using Jest and Supertest for unit and integration testing
   - **Docker Configuration** for containerization and easy deployment
   - **GitHub Actions Workflow** for CI/CD to automate testing and deployment
   - **OpenAPI Documetation** with swagger UI
   - **Health check endpoints** for monitoring service health
   - **ESlint and Prettier** for code quality and consistency

   ## how to use this template?
    1. Click the "Create" button and select this template
    2. Fill in the required fields such as service name, owner, and description
    3. Click "Create" to generate the new Node.js service repository
  tags:
    - nodejs
    - microservice
    - express
    - typescript
    - docker
    - backend
    - api
  links: 
    - url: https://expressjs.com/
      title: Express.js Documentation 
      icon: web
    - url: https://github.com/your-org/nodejs-example
      title: Example Service
      icon: github
spec:
  owner: platform-team
  type: service
  system: developer-tools

#user input parameters for the template
  parameters:
    - title: project Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: service name
          type: string
          description: The name of the new microservice (will be used for the repository name and service name)
          pattern: '^[a-z0-9-]+$'
          minLength: 3
          maxLength: 50
          ui:autofocus: true
          ui:help: 'Use lowercase letters, numbers, and hyphens only. 3-50 characters.'
          ui:placeholder: 'e.g. my-awesome-service'
        
        description:
          title: service description
          type: string
          description: A brief description of the microservice's purpose and functionality
          minLength: 5
          maxLength: 100
          ui:widget: textarea
          ui:options:
            rows: 3
          ui:help: 'Provide a clear and concise description (10-300 characters).'
          ui:placeholder: 'e.g. A service for managing user profiles and authentication.' 

        owner:
          title: Team owner
          type: string
          description: The team or individual responsible for maintaining the service
          enum:
            - platform-team
            - frontend-team
            - backend-team
            - devops-team
            - data-team
          enumNames:
            - Platform Team
            - Frontend Team
            - Backend Team
            - DevOps Team
            - Data Team
          ui:help: 'This determines who gets notified about changes and issues related to this service.'

    - title: Repository and Integration
      required:
        - github_owner
        - repository_name
      properties:
        github_owner:
          title: GitHub Owner
          type: string
          description: The GitHub organization or user that will own the repository for this service
          pattern: '^[a-zA-Z0-9-]+$'
          minLength: 1
          maxLength: 39
          ui:help: 'Example: my-github-username or my-company-org. The repository will be created under this owner.'
          ui:placeholder: 'e.g. your-github-username'
  
        repository_name:
          title: Repository Name
          type: string
          description: The name of the GitHub repository to be created for this service
          pattern: '^[a-z0-9-]+$'
          minLength: 3
          maxLength: 50
          ui:help: 'Use lowercase letters, numbers, and hyphens only. 3-50 characters.'
          ui:placeholder: 'e.g. my-awesome-service-repo'
        
        enable_cicd:
          title: Enable CI/CD pipeline
          type: boolean
          description: Whether to set up a GitHub Actions workflow for continuous integration and deployment
          default: true
          ui:help: 'If enabled, a GitHub Actions workflow will be created to automate testing and deployment of this service.'
        
        database_type:
          title: Database Integration
          type: string
          description: The type of database to use for this service (if any)
          enum:
            - none
            - postgres
            - mysql
            - mongodb
          enumNames:
            - None
            - PostgreSQL
            - MySQL
            - MongoDB
          default: postgres
          ui:help: 'Select the type of database you want to use. If you select "None", no database configuration will be included in the generated service.'
          
    - title: Technical Configuration
      properties:
        port_number:
          title: Default Port Number
          type: integer
          description: The default port number the service will listen on
          default: 3000
          minimum: 1000
          maximum: 65535
          ui:help: 'Specify the port number for the service (1000-65535). Default is 3000.'

        include_swagger:
          title: Include Swagger/OpenAPI Documentation
          type: boolean
          description: Whether to include interactive API documentation in the service
          default: true
          ui:help: 'If enabled, Swagger documentation will be generated and accessible at /docs.'
        
        include_health_checks:
          title: Include Health Check Endpoints
          type: boolean
          description: Add /health and /ready endpoints for monitoring service health and readiness
          default: true
          ui:help: 'If enabled, endpoints for health checks will be included to help monitor the service status.'
        
        api_version:
          title: API Version
          type: string
          description: The version of the API to be included in the service (e.g. v1, v2)
          enum:
            - v1
            - v1.0.0
            - 0.1.0
            - v2
          enumNames:
            - v1 (simple versioning)
            - v1.0.0 (semantic versioning)
            - 0.1.0 (pre-release versioning)
            - v2 (major version)  
          default: v1
          ui:help: 'Choose the API version (e.g. v1, v2). This will be used in the route paths and documentation.'

        license: 
          title: Software License
          type: string
          description: The software license to apply to this service
          enum:
            - MIT
            - Apache-2.0
            - GPL-3.0
            - BSD-3-Clause
          enumNames:
            - MIT License
            - Apache License 2.0
            - GNU General Public License v3.0
            - BSD 3-Clause "New" or "Revised" License
          default: MIT
          ui:help: 'Select the software license for this service. This will be included in the generated repository.'

  # scaffolding steps to generate the service based on user input
  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          github_owner: ${{ parameters.github_owner }}
          repository_name: ${{ parameters.repository_name }}
          port_number: ${{ parameters.port_number }}
          database_type: ${{ parameters.database_type }}
          include_swagger: ${{ parameters.include_swagger }}
          include_health_checks: ${{ parameters.include_health_checks }}
          api_version: ${{ parameters.api_version }}
          license: ${{ parameters.license }}

    - id: create-cicd
      name: Create CI/CD Workflow
      if: ${{ parameters.enable_cicd }}
      action: fetch:template
      input:
        url: ./cicd-templates
        targetPath: .github/workflows
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          database_type: ${{ parameters.database_type }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?repo=${{ parameters.repository_name }}&owner=${{ parameters.github_owner }}
        description: ${{ parameters.description }}
        defaultBranch: main
        gitCommitMessage: Initial commit - scaffolded Node.js service
        gitAuthorName: Backstage Scaffolder
        gitAuthorEmail: scaffolder@company.com

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: log-info
      name: Log Info
      action: debug:log
      input:
        message: |
          Created service:
          Name: ${{ parameters.name }}
          Owner: ${{ parameters.owner }}
          Repo: ${{ steps.publish.output.repoUrl }}
          Database: ${{ parameters.database_type }}
          Port: ${{ parameters.port_number }}

  #output shown to users afer template execution
  output:
    text:
      - title: Service Created
        content: |
          Node.js service successfully created.

          Service Name: ${{ parameters.name }}
          Owner: ${{ parameters.owner }}
          Repository: ${{ steps.publish.output.repoUrl }}
          Port: ${{ parameters.port_number }}
          API Version: ${{ parameters.api_version }}
          Database: ${{ parameters.database_type }}

    links:
      - title: View Repository
        url: ${{ steps.publish.output.repoUrl }}
        icon: github

      - title: View in Catalog
        url: ${{ steps.register.output.entityUrl }}
        icon: backstage

      - title: GitHub Actions
        url: ${{ steps.publish.output.repoUrl }}/actions
        icon: github